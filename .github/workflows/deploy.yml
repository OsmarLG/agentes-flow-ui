name: Deploy agentes-flow-ui (SSH only)

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agentes-flow-ui-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH (git pull + docker compose build/up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/root/.openclaw/agents-workspaces/elroi-dev"
            fi

            cd "$DEPLOY_PATH/projects/agentes-flow-ui"
            git fetch origin main
            git reset --hard origin/main

            cd "$DEPLOY_PATH"
            docker compose build --no-cache agentes-flow-ui
            docker compose up -d --force-recreate agentes-flow-ui
            docker ps --filter name=agentes-flow-ui --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.RunningFor}}'
